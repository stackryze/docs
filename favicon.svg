<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" role="img" aria-label="Stackryze">
 <title>Stackryze</title>
 <!--
    Favicon — the same bi-stack mark used in the navbar.
    Path data is duplicated here (this is a static .svg asset;
    Next.js serves it as-is and it can't import from a .ts
    file). Keep it in sync with src/components/ui/logo-paths.ts
    and src/components/ui/logo.tsx.

    Fill is the brand off-white (#F4F4F5) — matches the navbar's
    effective mark color (the navbar sits over `bg-foreground`
    with `text-background`, so the mark renders as off-white).
    No `currentColor` because a favicon has no parent context.
  -->
 <g fill="#F4F4F5">
 <!-- Layer 1 — bottom ring (full opacity) -->
 <path d="m14.12 10.163 1.715.858c.22.11.22.424 0 .534L8.267 15.34a.6.6 0 0 1-.534 0L.165 11.555a.299.299 0 0 1 0-.534l1.716-.858 5.317 2.659c.505.252 1.1.252 1.604 0l5.317-2.66Z"/>
 <!-- Layer 2 — middle ring (dimmed) -->
 <path d="m14.12 6.576 1.715.858c.22.11.22.424 0 .534l-7.568 3.784a.6.6 0 0 1-.534 0L.165 7.968a.299.299 0 0 1 0-.534l1.716-.858 5.317 2.659c.505.252 1.1.252 1.604 0Z" opacity="0.72"/>
 <!-- Layer 3 — top ring (slight dim) -->
 <path d="M7.733.063a.6.6 0 0 1 .534 0l7.568 3.784a.3.3 0 0 1 0 .535L8.267 8.165a.6.6 0 0 1-.534 0L.165 4.382a.299.299 0 0 1 0-.535Z" opacity="0.85"/>
 </g>
</svg>